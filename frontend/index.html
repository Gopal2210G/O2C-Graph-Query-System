<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order-to-Cash Graph System</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            height: 100vh;
            gap: 2px;
            background: #ddd;
        }

        .graph-container {
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .chat-container {
            background: #fff;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ddd;
            height: 100vh;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            background: #f9f9f9;
            flex-shrink: 0;
            border-left: 1px solid #ddd;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            max-height: 80px;
        }

        .chat-input-area button {
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .chat-input-area button:hover {
            background: #764ba2;
        }

        .chat-input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Graph styles */
        #graph {
            width: 100%;
            height: 100%;
        }

        .node {
            fill: #667eea;
            stroke: #333;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: fill 0.3s, r 0.3s;
        }

        .node:hover {
            fill: #764ba2;
            r: 8;
        }

        .node.highlighted {
            fill: #ff6b6b;
            stroke: #c92a2a;
            stroke-width: 3px;
            filter: drop-shadow(0 0 6px rgba(255, 107, 107, 0.5));
        }

        .link {
            stroke: #999;
            stroke-opacity: 0.6;
            stroke-width: 1.5px;
        }

        .link.highlighted {
            stroke: #ff6b6b;
            stroke-opacity: 1;
            stroke-width: 3px;
        }

        .node-label {
            font-size: 11px;
            pointer-events: none;
            text-anchor: middle;
            fill: #fff;
            font-weight: 600;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            max-width: 250px;
            word-wrap: break-word;
        }

        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .controls button {
            padding: 8px 12px;
            margin: 4px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #764ba2;
        }

        .controls button.active {
            background: #ff6b6b;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
            gap: 6px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #333;
        }

        .stats {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .stats-item {
            margin: 4px 0;
            color: #666;
        }

        .ref-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 4px;
            margin-top: 4px;
        }

        .loading {
            display: inline-block;
            margin-left: 8px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Structured Response Styling */
        .response-structured {
            font-size: 13px;
            line-height: 1.5;
        }

        .response-header {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 4px;
        }

        .response-section {
            margin: 10px 0;
            padding: 8px;
            background: rgba(102, 126, 234, 0.05);
            border-left: 3px solid #667eea;
            border-radius: 3px;
        }

        .response-section-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .response-item {
            margin: 6px 0;
            padding-left: 16px;
        }

        .response-item::before {
            content: "→ ";
            color: #667eea;
            font-weight: bold;
            margin-left: -12px;
            margin-right: 4px;
        }

        .response-metric {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .response-metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 500;
            color: #666;
        }

        .metric-value {
            font-weight: 700;
            color: #667eea;
            text-align: right;
        }

        .response-confidence {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #e0e0e0;
        }

        .entity-detail {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            margin: 8px 0;
            font-size: 12px;
        }

        .entity-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .entity-detail-row:last-child {
            border-bottom: none;
        }

        .entity-label {
            font-weight: 600;
            color: #666;
            min-width: 100px;
        }

        .entity-value {
            color: #333;
            text-align: right;
            word-break: break-word;
        }

        /* Full Entity Details Panel Styles */
        .referenced-entities-panel {
            background: #f5f5f5;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
        }

        .referenced-entities-header {
            font-size: 14px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .entity-card {
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .entity-card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8e8;
        }

        .entity-card-title {
            font-weight: 700;
            color: #333;
            font-size: 13px;
        }

        .entity-card-type {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .entity-properties {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .entity-properties {
                grid-template-columns: 1fr;
            }
        }

        .property-row {
            display: flex;
            flex-direction: column;
            padding: 6px;
            background: #fafafa;
            border-radius: 4px;
            border-left: 2px solid #ddd;
        }

        .property-label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            margin-bottom: 2px;
        }

        .property-value {
            font-size: 12px;
            color: #333;
            word-break: break-word;
        }

        .entity-relationships-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e8e8e8;
        }

        .relationships-title {
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .relationships-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .relationship-badge {
            background: #e8eef8;
            border: 1px solid #667eea;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .relationship-badge.inbound {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .relationship-badge.outbound {
            background: #fff0f4;
            border-color: #ff6b6b;
        }

        .relationship-arrow {
            font-size: 10px;
            color: #999;
        }

        .relationship-type {
            font-weight: 600;
            color: #667eea;
        }

        .relationship-target {
            color: #666;
        }

        /* Entity Details Panel - Graph Node Inspection */
        .entity-details-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .entity-details-modal.show {
            display: flex;
        }

        .entity-details-panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .entity-details-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #667eea;
        }

        .entity-details-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .entity-details-type {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }

        .entity-details-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .entity-details-close:hover {
            background: #e0e0e0;
            color: #333;
        }

        .entity-field {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .entity-field:last-child {
            border-bottom: none;
        }

        .entity-field-name {
            font-weight: 600;
            color: #667eea;
            word-break: break-word;
        }

        .entity-field-value {
            color: #333;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .entity-field-value.empty {
            color: #999;
            font-style: italic;
        }

        .entity-connections {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #f0f0f0;
        }

        .entity-connections-title {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .entity-connections-badge {
            background: #e8eef8;
            border: 1px solid #667eea;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: #333;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="graph-container">
            <svg id="graph"></svg>
            <div class="controls">
                <button id="zoomInBtn" title="Zoom In">+ Zoom</button>
                <button id="zoomOutBtn" title="Zoom Out">- Zoom</button>
                <button id="resetBtn" title="Reset View">Reset</button>
                <button id="toggleLabelsBtn" title="Toggle Labels">Labels</button>
            </div>
            <div class="stats">
                <div class="stats-item"><strong>Graph Stats</strong></div>
                <div class="stats-item">Nodes: <span id="nodeCount">0</span></div>
                <div class="stats-item">Edges: <span id="edgeCount">0</span></div>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background: #667eea;"></div>
                    <span>Entity</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #ff6b6b;"></div>
                    <span>Referenced</span>
                </div>
                <div class="legend-item">
                    <span style="font-size: 11px; color: #999;">Lines = Relationships</span>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">O2C Query Assistant</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <textarea id="chatInput" placeholder="Ask about orders, deliveries, billing..." rows="3"></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip" style="display: none;"></div>

    <!-- Entity Details Modal -->
    <div class="entity-details-modal" id="entityDetailsModal">
        <div class="entity-details-panel">
            <button class="entity-details-close" onclick="closeEntityDetails()">&times;</button>
            <div id="entityDetailsContent"></div>
        </div>
    </div>

    <script>
        // ============================================================================
        // Global State
        // ============================================================================
        const state = {
            graphData: null,
            simulation: null,
            svg: null,
            g: null,
            highlightedNodes: new Set(),
            showLabels: true,
            zoom: null,
        };

        const API_BASE = window.location.origin;

        // ============================================================================
        // Graph Visualization
        // ============================================================================

        async function initializeGraph() {
            try {
                const response = await fetch(`${API_BASE}/graph`);
                state.graphData = await response.json();

                renderGraph(state.graphData);
                updateStats();
            } catch (error) {
                console.error('Error loading graph:', error);
                showMessage('System', 'Failed to load graph data', false);
            }
        }

        function renderGraph(data) {
            const width = document.querySelector('.graph-container').clientWidth;
            const height = document.querySelector('.graph-container').clientHeight;

            // Clear existing
            d3.select('#graph').selectAll('*').remove();

            const svg = d3.select('#graph')
                .attr('width', width)
                .attr('height', height);

            state.svg = svg;

            // Add zoom
            state.zoom = d3.zoom().on('zoom', (event) => {
                state.g.attr('transform', event.transform);
            });

            svg.call(state.zoom);

            // Main group
            state.g = svg.append('g');

            // Force simulation
            state.simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.edges)
                    .id(d => d.id)
                    .distance(100)
                    .strength(0.5))
                .force('charge', d3.forceManyBody().strength(-200))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(25));

            // Links
            const links = state.g.selectAll('.link')
                .data(data.edges)
                .enter()
                .append('line')
                .attr('class', 'link')
                .attr('stroke-width', d => Math.sqrt(1));

            // Nodes
            const nodes = state.g.selectAll('.node')
                .data(data.nodes)
                .enter()
                .append('circle')
                .attr('class', 'node')
                .attr('r', 6)
                .attr('id', d => `node-${d.id}`)
                .on('click', (event, d) => {
                    event.stopPropagation();
                    highlightNode(d.id);
                    showNodeDetails(d.id);
                })
                .on('mouseover', (event, d) => {
                    showTooltip(event, d.label + ' (' + d.type + ')');
                })
                .on('mouseout', hideTooltip)
                .call(d3.drag()
                    .on('start', dragStarted)
                    .on('drag', dragged)
                    .on('end', dragEnded));

            // Labels
            const labels = state.g.selectAll('.node-label')
                .data(data.nodes)
                .enter()
                .append('text')
                .attr('class', 'node-label')
                .text(d => d.type.substring(0, 3))
                .attr('dy', -4);

            state.simulation.on('tick', () => {
                links
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                nodes
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);

                labels
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });

            // SVG click to deselect
            svg.on('click', () => {
                clearHighlight();
            });

            // Setup controls
            document.getElementById('zoomInBtn').addEventListener('click', () => {
                svg.transition().duration(750).call(state.zoom.scaleBy, 1.3);
            });

            document.getElementById('zoomOutBtn').addEventListener('click', () => {
                svg.transition().duration(750).call(state.zoom.scaleBy, 0.75);
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                svg.transition().duration(750).call(state.zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2));
            });

            document.getElementById('toggleLabelsBtn').addEventListener('click', () => {
                state.showLabels = !state.showLabels;
                labels.style('visibility', state.showLabels ? 'visible' : 'hidden');
            });
        }

        function dragStarted(event, d) {
            if (!event.active) state.simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragEnded(event, d) {
            if (!event.active) state.simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function highlightNode(nodeId) {
            clearHighlight();
            state.highlightedNodes.add(nodeId);
            document.getElementById(`node-${nodeId}`).classList.add('highlighted');
        }

        function clearHighlight() {
            state.highlightedNodes.forEach(id => {
                const elem = document.getElementById(`node-${id}`);
                if (elem) elem.classList.remove('highlighted');
            });
            state.highlightedNodes.clear();
        }

        function updateStats() {
            if (state.graphData) {
                document.getElementById('nodeCount').textContent = state.graphData.nodes.length;
                document.getElementById('edgeCount').textContent = state.graphData.edges.length;
            }
        }

        function showTooltip(event, text) {
            const tooltip = document.getElementById('tooltip');
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY + 10) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        async function showNodeDetails(nodeId) {
            const [type, id] = nodeId.split(':');
            try {
                // Fetch detailed information from backend
                const response = await fetch(`${API_BASE}/graph/entity/${type}/${id}`);
                if (!response.ok) {
                    throw new Error('Entity not found');
                }

                const data = await response.json();

                // Build detailed HTML
                let html = `
                    <div class="entity-details-header">
                        <div>
                            <div class="entity-details-title">${type}</div>
                            <div style="font-size: 12px; color: #999; margin-top: 2px;">Entity: ${type}</div>
                        </div>
                        <div class="entity-details-type">${type}</div>
                    </div>
                `;

                // Display all attributes
                html += '<div style="margin: 12px 0;">';
                if (data.attributes && Object.keys(data.attributes).length > 0) {
                    Object.entries(data.attributes).forEach(([key, value]) => {
                        const displayKey = key.replace(/_/g, ' ').replace(/([A-Z])/g, ' $1').trim();
                        const displayValue = value === null || value === undefined || value === '' ? '(empty)' : String(value);
                        const isEmptyClass = displayValue === '(empty)' ? 'empty' : '';
                        
                        html += `
                            <div class="entity-field">
                                <div class="entity-field-name">${displayKey}:</div>
                                <div class="entity-field-value ${isEmptyClass}">${displayValue.substring(0, 200)}</div>
                            </div>
                        `;
                    });
                } else {
                    html += '<div style="color: #999; font-style: italic;">No attributes available</div>';
                }
                html += '</div>';

                // Display connections
                const predecessors = data.connected_to?.predecessors || [];
                const successors = data.connected_to?.successors || [];

                if (predecessors && predecessors.length > 0) {
                    html += `
                        <div class="entity-connections">
                            <div class="entity-connections-title">← Incoming Relationships (${predecessors.length})</div>
                            <div class="entity-connections-badge">From ${predecessors.length} other entities</div>
                        </div>
                    `;
                }

                if (successors && successors.length > 0) {
                    html += `
                        <div class="entity-connections">
                            <div class="entity-connections-title">→ Outgoing Relationships (${successors.length})</div>
                            <div class="entity-connections-badge">To ${successors.length} other entities</div>
                        </div>
                    `;
                }

                // Display total connections
                const totalConnections = (predecessors?.length || 0) + (successors?.length || 0);
                if (totalConnections === 0) {
                    html += `
                        <div class="entity-connections">
                            <div class="entity-connections-title">↔️ Connections</div>
                            <div class="entity-connections-badge">No connected entities</div>
                        </div>
                    `;
                }

                // Show modal
                const modal = document.getElementById('entityDetailsModal');
                const content = document.getElementById('entityDetailsContent');
                content.innerHTML = html;
                modal.classList.add('show');

            } catch (error) {
                console.error('Error fetching node details:', error);
                alert('Could not load entity details: ' + error.message);
            }
        }

        function closeEntityDetails() {
            const modal = document.getElementById('entityDetailsModal');
            modal.classList.remove('show');
        }

        // Close modal when clicking outside
        const modalElement = document.getElementById('entityDetailsModal');
        if (modalElement) {
            modalElement.addEventListener('click', (e) => {
                if (e.target.id === 'entityDetailsModal') {
                    closeEntityDetails();
                }
            });
        }

        // ============================================================================
        // Chat Interface
        // ============================================================================

        function showMessage(sender, content, isUser = false, structured = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgEl = document.createElement('div');
            msgEl.className = `message ${isUser ? 'user' : 'assistant'}`;

            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            
            if (structured && typeof content === 'object') {
                // Build structured HTML
                let html = '<div class="response-structured">';
                
                // Main answer
                if (content.answer) {
                    html += `<div class="response-header">${content.answer}</div>`;
                }
                
                // Data insights section
                if (content.insights && content.insights.length > 0) {
                    html += '<div class="response-section">';
                    html += '<div class="response-section-title">📊 Key Insights:</div>';
                    content.insights.forEach(insight => {
                        html += `<div class="response-item">${insight}</div>`;
                    });
                    html += '</div>';
                }
                
                // Metrics section
                if (content.metrics && Object.keys(content.metrics).length > 0) {
                    html += '<div class="response-section">';
                    html += '<div class="response-section-title">📈 Metrics:</div>';
                    Object.entries(content.metrics).forEach(([label, value]) => {
                        html += `
                            <div class="response-metric">
                                <span class="metric-label">${label}</span>
                                <span class="metric-value">${value}</span>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
                
                // Data table section
                if (content.data && content.data.length > 0) {
                    html += '<div class="response-section">';
                    html += '<div class="response-section-title">📋 Data:</div>';
                    content.data.forEach(item => {
                        html += '<div class="entity-detail">';
                        Object.entries(item).forEach(([key, value]) => {
                            html += `
                                <div class="entity-detail-row">
                                    <span class="entity-label">${key}:</span>
                                    <span class="entity-value">${value}</span>
                                </div>
                            `;
                        });
                        html += '</div>';
                    });
                    html += '</div>';
                }
                
                // Confidence/source
                if (content.source) {
                    html += `<div class="response-confidence">✓ Source: ${content.source}</div>`;
                }
                
                html += '</div>';
                contentEl.innerHTML = html;
            } else {
                // Plain text message
                contentEl.innerHTML = (typeof content === 'string' ? content : JSON.stringify(content))
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/__(.*?)__/g, '<u>$1</u>');
            }

            msgEl.appendChild(contentEl);
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function renderEntityDetailsPanel(entitiesData) {
            // Render detailed entity panel with all properties and relationships.
            if (!entitiesData || !entitiesData.entities || entitiesData.entities.length === 0) {
                return '';
            }

            let html = '<div class="referenced-entities-panel">';
            html += `<div class="referenced-entities-header">🔗 Referenced Entities (${entitiesData.total_entities})</div>`;

            entitiesData.entities.forEach((entity, idx) => {
                html += '<div class="entity-card">';

                // Entity header with type
                html += '<div class="entity-card-header">';
                html += `<div class="entity-card-title">${entity.id}</div>`;
                html += `<div class="entity-card-type">${entity.type}</div>`;
                html += '</div>';

                // Entity properties
                if (Object.keys(entity.properties).length > 0) {
                    html += '<div class="entity-properties">';
                    Object.entries(entity.properties).slice(0, 6).forEach(([key, value]) => {
                        html += `
                            <div class="property-row">
                                <div class="property-label">${key.replace(/_/g, ' ')}</div>
                                <div class="property-value">${value}</div>
                            </div>
                        `;
                    });
                    if (Object.keys(entity.properties).length > 6) {
                        html += `<div class="property-row"><div class="property-label" style="color: #999;">+${Object.keys(entity.properties).length - 6} more</div></div>`;
                    }
                    html += '</div>';
                }

                // Relationships section
                const totalRelationships = entity.inbound_relationships.length + entity.outbound_relationships.length;
                if (totalRelationships > 0) {
                    html += '<div class="entity-relationships-section">';
                    html += `<div class="relationships-title">↔️ Relationships (${totalRelationships})</div>`;
                    html += '<div class="relationships-list">';

                    // Inbound relationships
                    entity.inbound_relationships.forEach((rel) => {
                        html += `
                            <div class="relationship-badge inbound" title="${rel.source_type}">
                                <span class="relationship-arrow">←</span>
                                <span class="relationship-type">${rel.relationship}</span>
                            </div>
                        `;
                    });

                    // Outbound relationships
                    entity.outbound_relationships.forEach((rel) => {
                        html += `
                            <div class="relationship-badge outbound" title="${rel.target_type}">
                                <span class="relationship-type">${rel.relationship}</span>
                                <span class="relationship-arrow">→</span>
                            </div>
                        `;
                    });

                    html += '</div>';
                    html += '</div>';
                }

                html += '</div>';
            });

            html += '</div>';
            return html;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            const button = document.getElementById('sendBtn');
            button.disabled = true;
            button.innerHTML = '<span class="spinner"></span>';

            showMessage('You', message, true);
            input.value = '';

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_query: message,
                        messages: []
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                // Check if response has structured format
                if (data.structured_response) {
                    // Use structured response
                    showMessage('Assistant', data.structured_response, false, true);

                    // Render entity details if available
                    if (data.referenced_entities && data.referenced_entities.entities) {
                        const messagesDiv = document.getElementById('chatMessages');
                        const lastMsg = messagesDiv.lastChild;
                        const entityPanel = renderEntityDetailsPanel(data.referenced_entities);
                        if (entityPanel) {
                            const entityDiv = document.createElement('div');
                            entityDiv.innerHTML = entityPanel;
                            lastMsg.appendChild(entityDiv);
                        }
                    }
                } else {
                    // Fallback to plain text response
                    let responseText = data.response;
                    if (data.referenced_nodes && data.referenced_nodes.length > 0) {
                        responseText += '<br><br><strong>Referenced:</strong><br>';
                        data.referenced_nodes.forEach(node => {
                            responseText += `<span class="ref-badge">${node}</span>`;
                        });

                        // Highlight nodes in graph
                        data.referenced_nodes.forEach(node => {
                            try {
                                if (state.highlightedNodes.size < 10) {
                                    highlightNode(node);
                                }
                            } catch (e) {
                                // Ignore invalid node IDs
                            }
                        });
                    }

                    showMessage('Assistant', responseText, false);

                    // Also render entity details for plain text responses
                    if (data.referenced_entities && data.referenced_entities.entities) {
                        const messagesDiv = document.getElementById('chatMessages');
                        const lastMsg = messagesDiv.lastChild;
                        const entityPanel = renderEntityDetailsPanel(data.referenced_entities);
                        if (entityPanel) {
                            const entityDiv = document.createElement('div');
                            entityDiv.innerHTML = entityPanel;
                            lastMsg.appendChild(entityDiv);
                        }
                    }
                }

                // Always highlight referenced nodes if available
                if (data.referenced_nodes && data.referenced_nodes.length > 0) {
                    data.referenced_nodes.forEach(node => {
                        try {
                            if (state.highlightedNodes.size < 10) {
                                highlightNode(node);
                            }
                        } catch (e) {
                            // Ignore invalid node IDs
                        }
                    });
                }

            } catch (error) {
                console.error('Error:', error);
                showMessage('System', 'Error processing query: ' + error.message, false);
            } finally {
                button.disabled = false;
                button.innerHTML = 'Send';
            }
        }

        // ============================================================================
        // Initialization
        // ============================================================================

        document.addEventListener('DOMContentLoaded', () => {
            // Check API health
            fetch(`${API_BASE}/health`)
                .then(r => r.json())
                .then(data => {
                    console.log('API Health:', data);
                    showMessage('System', `System initialized. Graph ready with ${data.graph_nodes} nodes.`, false);
                    initializeGraph();
                })
                .catch(err => {
                    console.error('Health check failed:', err);
                    showMessage('System', 'Failed to connect to backend API', false);
                });

            // Enter to send (Shift+Enter for new line)
            document.getElementById('chatInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Welcome message
            setTimeout(() => {
                showMessage('Assistant', 'Welcome to the Order-to-Cash Graph System! 👋<br><br>Ask me about:<br>• Orders and deliveries<br>• Billing and payments<br>• Customer transactions<br>• Product flows<br>• Data tracing<br><br>Try: "Which products have highest billing?"', false);
            }, 500);
        });

        // Resize handler
        window.addEventListener('resize', () => {
            if (state.graphData) {
                renderGraph(state.graphData);
            }
        });
    </script>
</body>
