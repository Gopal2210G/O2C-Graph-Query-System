services:
  - type: web
    name: o2c-graph-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATA_PATH
        value: ./sap-o2c-data
      - key: GROQ_API_KEY
        sync: false